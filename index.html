<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lawin Canvas — AR Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <!-- A-Frame (required by MindAR's A-Frame build) -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR Image Tracking (A-Frame integration) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- ===================== 1. WELCOME SCREEN ===================== -->
  <div id="welcome-screen">
    <div class="dust-field" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="welcome-inner">
      <div class="logo-glow" aria-hidden="true"></div>
      <img class="logo" src="assets/logo.png" alt="Lawin Canvas" />

      <p class="welcome-copy">
        Welcome to Lawin Canvas.<br />
        Where paintings come alive through stories, motion, and inspiration.
      </p>

      <button id="begin-button" class="begin-button">Begin AR Experience</button>
    </div>

    <p class="footer-tagline">Scan. Discover. Experience.</p>
  </div>

  <!-- ===================== 2. CAMERA INSTRUCTION ===================== -->
  <div id="instruction-overlay" class="hidden">
    <div class="instruction-frame"></div>
    <p class="instruction-text">Point your camera at any Lawin Canvas painting.</p>
  </div>

  <!-- ===================== 4. INFORMATION CARD ===================== -->
  <div id="info-card" class="hidden">
    <div class="info-card-inner">
      <p class="ic-eyebrow" id="ic-eyebrow"></p>
      <h2 class="ic-title" id="ic-title"></h2>
      <p class="ic-subtitle" id="ic-subtitle"></p>
      <p class="ic-story" id="ic-story"></p>
      <p class="ic-meta" id="ic-meta"></p>
      <button id="experience-button" class="experience-button">&#9658; Experience the Painting</button>
    </div>
  </div>

  <!-- ===================== AR EXPERIENCE (camera + tracked video) ===================== -->
  <div id="ar-container" class="hidden">
    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: assets/targets/targets.mind; autoStart: false; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 100; missTolerance: 10; warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets id="ar-assets"></a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Painting target entities are generated at runtime from data/paintings.json -->
      <!-- See src/app.js -> buildTargetEntities() -->
    </a-scene>
  </div>

  <script src="src/app.js"></script>
</body>
</html>
