<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DIAGNOSTIC TEST — LC001 minimal</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #start-btn {
      position: fixed; z-index: 50; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: sans-serif; font-size: 18px; padding: 14px 28px;
      border-radius: 8px; border: none; background: #c9a24a; color: #1b1607;
    }
    a-scene { width: 100%; height: 100%; }
  </style>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- Only a single button to satisfy camera-permission user-gesture requirement.
       No welcome screen, no instruction overlay, no info card. -->
  <button id="start-btn">Start Camera (Diagnostic Test)</button>

  <div id="ar-container" class="hidden" style="display:none;">
    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: assets/targets/targets.mind; autoStart: false;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets id="ar-assets"></a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <!-- Entities generated at runtime by app-test.js from data/paintings.json -->
    </a-scene>
  </div>

  <script src="src/app-test.js"></script>
</body>
</html>
